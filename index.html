<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone (P2P Online)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- PeerJS for P2P communication -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg-color: #0c0d11;
            --sidebar-bg: rgba(32, 33, 36, 0.7);
            --chat-bg: #131317;
            --accent-color: #00a884;
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
            --bubble-sent: #005c4b;
            --bubble-received: #202c33;
            --glass-blur: blur(20px);
            --transition-speed: 0.3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 168, 132, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 168, 132, 0.1) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 1400px;
            height: 95vh;
            display: flex;
            background: rgba(28, 28, 35, 0.4);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
        }

        /* Sidebar Style */
        .sidebar {
            width: 380px;
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-header {
            padding: 24px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.02);
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00a884, #00d2ff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 1.1rem;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 168, 132, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
        }

        .my-id-container {
            padding: 24px;
            background: rgba(255, 255, 255, 0.03);
            margin: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            position: relative;
            overflow: hidden;
        }

        .my-id-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(0, 168, 132, 0.05), transparent);
            pointer-events: none;
        }

        .my-id-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .my-id-display {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #000;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .my-id-value {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 0.85rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        .copy-btn {
            background: transparent;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            padding: 4px;
            transition: transform 0.2s;
        }

        .copy-btn:hover { transform: scale(1.1); }

        .connection-form {
            padding: 0 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            position: relative;
        }

        .input-field {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 20px;
            border-radius: 14px;
            color: white;
            outline: none;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .input-field:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.09);
            box-shadow: 0 0 15px rgba(0, 168, 132, 0.1);
        }

        .btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
            box-shadow: 0 8px 20px rgba(0, 168, 132, 0.3);
        }

        .btn:active { transform: translateY(0); }

        .contact-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px 15px;
        }

        .contact-list::-webkit-scrollbar { width: 5px; }
        .contact-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .contact-item {
            padding: 18px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 18px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
            border: 1px solid transparent;
        }

        .contact-item:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .contact-item.active {
            background: rgba(0, 168, 132, 0.08);
            border-color: rgba(0, 168, 132, 0.15);
        }

        .contact-content {
            flex: 1;
        }

        .contact-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .contact-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .contact-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .contact-preview {
            font-size: 0.85rem;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 180px;
        }

        /* Chat Window Style */
        .chat-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--chat-bg);
            position: relative;
        }

        .chat-header {
            padding: 20px 35px;
            background: rgba(19, 19, 23, 0.6);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .chat-messages {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-image: 
                linear-gradient(rgba(19, 19, 23, 0.9), rgba(19, 19, 23, 0.9)),
                url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: 400px;
            background-attachment: fixed;
        }

        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); border-radius: 10px; }

        .message-bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
            animation: messagePop 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        @keyframes messagePop {
            from { opacity: 0; transform: scale(0.8) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .message-sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #005c4b, #00705a);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-received {
            align-self: flex-start;
            background: var(--bubble-received);
            color: #d1d7db;
            border-bottom-left-radius: 4px;
        }

        .message-footer {
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: flex-end;
            margin-top: 6px;
            font-size: 0.65rem;
            opacity: 0.7;
        }

        .chat-input-area {
            padding: 24px 35px;
            background: rgba(19, 19, 23, 0.6);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            gap: 18px;
            align-items: center;
        }

        .message-input-wrapper {
            flex: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 24px;
            border-radius: 30px;
            color: white;
            outline: none;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .message-input:focus {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 168, 132, 0.9);
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 500;
            backdrop-filter: blur(8px);
            transition: transform 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0, 168, 132, 0.3);
        }

        #toast.show { transform: translateX(-50%) translateY(0); }

        /* Empty State */
        .empty-chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            opacity: 0.6;
            text-align: center;
            padding: 60px;
        }

        .empty-chat-icon {
            width: 120px;
            height: 120px;
            background: rgba(0, 168, 132, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            color: var(--accent-color);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar { width: 320px; }
        }

        @media (max-width: 768px) {
            .app-container { height: 100vh; border-radius: 0; }
            .sidebar { position: absolute; left: 0; top: 0; height: 100%; z-index: 100; width: 100%; transform: translateX(-100%); }
            .sidebar.show { transform: translateX(0); }
        }
    </style>
</head>
<body>
    <div id="toast">ID Kopyalandı!</div>

    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar">U</div>
                    <div>
                        <div style="font-weight: 600; font-size: 0.9rem;">Siz</div>
                        <div style="font-size: 0.75rem; color: #00ff88; display: flex; align-items: center; gap: 5px;">
                            <span class="status-dot"></span> Çevrimiçi
                        </div>
                    </div>
                </div>
            </div>

            <div class="my-id-container">
                <div class="my-id-label">Benim Bağlantı Kimliğim</div>
                <div class="my-id-display">
                    <div class="my-id-value" id="my-id">Oluşturuluyor...</div>
                    <button class="copy-btn" onclick="copyId()" title="Kopyala">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z"/></svg>
                    </button>
                </div>
                <p style="font-size: 0.72rem; color: var(--text-secondary); margin-top: 12px; line-height: 1.4;">
                    Arkadaşınızın size bağlanması için bu ID'yi ona gönderin.
                </p>
            </div>

            <div class="connection-form">
                <div class="input-group">
                    <input type="text" id="target-peer-id" class="input-field" placeholder="Arkadaşının ID'sini gir...">
                </div>
                <button class="btn" onclick="connect()">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M21 3L3 10.53V11.51L9.81 14.19L18.65 6.43L10.01 15.34L10.15 15.4L18.8 20.67L19.8 19.82L21 3Z"/></svg>
                    Bağlantı Kur
                </button>
            </div>

            <div class="contact-list" id="contact-list">
                <!-- Contacts will be populated here -->
            </div>
        </div>

        <!-- Chat Area -->
        <main class="chat-window">
            <div id="no-chat-state" class="empty-chat">
                <div class="empty-chat-icon">
                    <svg viewBox="0 0 24 24" width="64" height="64" fill="currentColor"><path d="M12,2C6.48,2,2,6.48,2,12c0,2.17,0.7,4.18,1.89,5.83L2.11,21.89c-0.18,0.45-0.02,0.97,0.4,1.25c0.16,0.11,0.35,0.17,0.53,0.17 c0.27,0,0.53-0.11,0.73-0.31l3.52-3.14C8.4,20.58,10.13,21,12,21c5.52,0,10-4.48,10-10S17.52,2,12,2z M12,19c-1.74,0-3.35-0.45-4.75-1.24 c-0.21-0.12-0.46-0.13-0.68-0.03l-2.43,2.16l1.09-2.73c0.11-0.28,0.06-0.59-0.13-0.82C4.38,15.22,4,13.68,4,12c0-4.41,3.59-8,8-8 s8,3.59,8,8S16.41,19,12,19z"/></svg>
                </div>
                <h1 style="font-weight: 500; font-size: 1.8rem; margin-bottom: 12px; color: white;">WhatsApp Web P2P</h1>
                <p style="color: var(--text-secondary); max-width: 350px; line-height: 1.6;">
                    Uçtan uca şifreli, gerçek zamanlı ve doğrudan bağlantı. Konuşmaya başlamak için birini davet edin.
                </p>
            </div>

            <div id="active-chat-state" style="display: none; height: 100%; flex-direction: column;">
                <header class="chat-header">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <button class="btn" id="mobile-back" style="display: none; background: transparent; padding: 5px; box-shadow: none;" onclick="toggleSidebar(true)">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                        </button>
                        <div class="avatar" id="header-avatar" style="width: 42px; height: 42px;">?</div>
                        <div>
                            <div id="header-name" style="font-weight: 600; font-size: 1rem;">Sohbet</div>
                            <div style="font-size: 0.75rem; color: #00ff88;">Şu an aktif</div>
                        </div>
                    </div>
                </header>

                <div class="chat-messages" id="messages">
                    <!-- Messages will appear here -->
                </div>

                <footer class="chat-input-area">
                    <div class="message-input-wrapper">
                        <input type="text" id="msg-input" class="message-input" placeholder="Mesajınızı buraya yazın...">
                    </div>
                    <button class="btn" style="border-radius: 50%; width: 50px; height: 50px; padding: 0;" onclick="send()">
                        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </footer>
            </div>
        </main>
    </div>

    <script>
        let peer;
        let activeConn = null;
        const sidebar = document.getElementById('sidebar');
        const messagesEl = document.getElementById('messages');
        const msgInput = document.getElementById('msg-input');
        const myIdValue = document.getElementById('my-id');
        const contactList = document.getElementById('contact-list');
        const mobileBack = document.getElementById('mobile-back');

        // Initialize Peer
        function init() {
            peer = new Peer();

            peer.on('open', (id) => {
                myIdValue.innerText = id;
            });

            peer.on('connection', (conn) => {
                setupConnection(conn);
                addContact(conn.peer);
            });

            peer.on('error', (err) => {
                console.error(err);
                if(err.type === 'peer-not-found') alert('Böyle bir ID bulunamadı.');
            });

            // Handle mobile initial state
            if (window.innerWidth <= 768) {
                toggleSidebar(true);
                mobileBack.style.display = 'block';
            }
        }

        function setupConnection(conn) {
            activeConn = conn;
            
            conn.on('open', () => {
                switchChat(conn.peer);
                if (window.innerWidth <= 768) toggleSidebar(false);
            });

            conn.on('data', (data) => {
                appendMessage(data, 'received');
            });

            conn.on('close', () => {
                alert('Bağlantı koptu.');
                location.reload();
            });
        }

        function toggleSidebar(show) {
            if (show) {
                sidebar.classList.add('show');
            } else {
                sidebar.classList.remove('show');
            }
        }

        function connect() {
            const destId = document.getElementById('target-peer-id').value.trim();
            if(!destId) return;
            
            const conn = peer.connect(destId);
            setupConnection(conn);
            addContact(destId);
        }

        function send() {
            const text = msgInput.value.trim();
            if(!text || !activeConn) return;

            activeConn.send(text);
            appendMessage(text, 'sent');
            msgInput.value = '';
            msgInput.focus();
        }

        function appendMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message-bubble message-${type}`;
            
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
            
            div.innerHTML = `
                <div class="message-text">${text}</div>
                <div class="message-footer">
                    <span>${time}</span>
                    ${type === 'sent' ? '<svg width="15" height="15" viewBox="0 0 24 24" fill="#53bdeb"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>' : ''}
                </div>
            `;
            
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function switchChat(id) {
            document.getElementById('no-chat-state').style.display = 'none';
            document.getElementById('active-chat-state').style.display = 'flex';
            document.getElementById('header-name').innerText = `ID: ${id.substring(0, 8)}...`;
            document.getElementById('header-avatar').innerText = id.substring(0,1).toUpperCase();
        }

        function addContact(id) {
            if(document.getElementById(`c-${id}`)) return;
            
            const div = document.createElement('div');
            div.className = 'contact-item active';
            div.id = `c-${id}`;
            div.innerHTML = `
                <div class="avatar" style="width: 48px; height: 48px;">${id.substring(0,1).toUpperCase()}</div>
                <div class="contact-content">
                    <div class="contact-top">
                        <span class="contact-name">${id.substring(0,8)}...</span>
                        <span class="contact-time">Şimdi</span>
                    </div>
                    <div class="contact-preview">Bağlantı kuruldu</div>
                </div>
            `;
            contactList.prepend(div);
        }

        function copyId() {
            const id = myIdValue.innerText;
            navigator.clipboard.writeText(id).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2500);
            });
        }

        msgInput.onkeypress = (e) => { if(e.key === 'Enter') send(); };

        init();
    </script>
</body>
</html>
